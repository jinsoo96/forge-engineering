# Fixed benchmark — read-only for Smith.
# Removing or modifying this file is prohibited by FORGE.md locked_surface.
#
# J(H) is the average of `score` across tasks after running the current harness.
# For v0, each task's `score` is set manually after a dry-run; future versions
# will execute tasks and compute scores live.

baseline: 0.0

tasks:
  - id: t01-read-config
    description: |
      The agent must locate the project's primary config file and answer what
      database URL it declares. Success = correct URL string returned.
    score: 0.0

  - id: t02-fix-test
    description: |
      A failing unit test references a missing fixture. The agent must locate
      the fixture (it is not imported), import it, and make the test pass.
    score: 0.0

  - id: t03-add-endpoint
    description: |
      Add a new GET /health endpoint that returns 200. The agent must also
      add a matching test and have both pass.
    score: 0.0
